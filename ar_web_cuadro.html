<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realidad Aumentada - Cuadro Mágico</title>
    
    <!-- Librerías de A-Frame y MindAR -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; background-color: #000; }
      #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.9);
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        z-index: 9999; font-family: sans-serif; color: white; text-align: center;
      }
      #startButton {
        padding: 20px 40px; font-size: 20px; font-weight: bold;
        color: #000; background: #deff9a; border: none; border-radius: 50px;
        cursor: pointer; transition: transform 0.2s;
      }
      #startButton:hover { transform: scale(1.05); }
    </style>
  </head>
  <body>

    <div id="overlay">
      <h1 style="margin-bottom: 20px;">Cuadro Mágico AR</h1>
      <p style="margin-bottom: 30px;">Presiona para iniciar inmersión en Quest 3</p>
      <button id="startButton">INICIAR EXPERIENCIA</button>
    </div>

    <!-- Escena configurada para solicitar WebXR y Passthrough -->
    <a-scene 
      webxr="requiredFeatures: passthrough;"
      mindar-image="imageTargetSrc: ./marcador.mind; filterMinCF: 0.0001; filterBeta: 0.001;" 
      vr-mode-ui="enabled: true" 
      device-orientation-permission-ui="enabled: false"
      embedded>
      
      <a-assets>
        <video id="videoProyectado" src="./video.mp4" loop="true" crossorigin="anonymous" playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="objetivo">
        <a-video src="#videoProyectado" width="1" height="0.6" position="0 0 0"></a-video>
      </a-entity>
      
    </a-scene>

    <script>
      const overlay = document.querySelector('#overlay');
      const startButton = document.querySelector('#startButton');
      const video = document.querySelector('#videoProyectado');
      const scene = document.querySelector('a-scene');

      startButton.addEventListener('click', () => {
        // Ocultar overlay
        overlay.style.display = 'none';
        
        // Solicitar modo VR/WebXR inmersivo
        scene.enterVR();
        
        // Reproducir video
        video.muted = false;
        video.play().catch(console.error);
      });

      const objetivo = document.querySelector('#objetivo');
      objetivo.addEventListener("targetFound", () => {
        video.play();
      });
      
      objetivo.addEventListener("targetLost", () => {
        video.pause();
      });
    </script>
  </body>
</html>
