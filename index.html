<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.7); display: flex;
        justify-content: center; align-items: center; z-index: 1000;
      }
      button { padding: 20px 40px; font-size: 20px; cursor: pointer; border-radius: 10px; border: none; }
    </style>
  </head>
  <body>
    <div id="overlay">
      <button id="btn-start">VER MI CUADRO EN AR</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./tu_cuadro.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;" 
      embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="vid" src="./tu_video.mp4" loop="true" playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Este grupo se mostrará solo cuando MindAR detecte tu cuadro -->
      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#vid" width="1" height="0.6" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const btn = document.querySelector('#btn-start');
      const scene = document.querySelector('a-scene');
      const video = document.querySelector('#vid');

      btn.addEventListener('click', () => {
        document.querySelector('#overlay').style.display = 'none';
        scene.mindarImageSystem.start(); // Inicia la cámara
      });

      // Lógica para que el video suene al tocar la pantalla
      scene.addEventListener('click', () => {
        video.play();
      });
    </script>
  </body>
</html>
